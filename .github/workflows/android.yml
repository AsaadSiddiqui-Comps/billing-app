name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Fix: pin react-native-screens to a version compatible with RN 0.79.x codegen
      # The older version had an undefined type on `accessibilityContainerViewIsModal`
      - name: Fix react-native-screens codegen compatibility
        run: npm install react-native-screens@4.5.0 --legacy-peer-deps

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Clear Gradle cache
        run: |
          rm -rf ~/.gradle/caches
          rm -rf android/.gradle

      - name: Clean build
        run: |
          cd android
          ./gradlew clean

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
