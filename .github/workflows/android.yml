name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Pin react-native-screens to a version compatible with RN 0.79.x codegen
      - name: Fix react-native-screens codegen compatibility
        run: npm install react-native-screens@4.5.0 --legacy-peer-deps

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # RN 0.79 is fully AndroidX-native — Jetifier must be OFF.
      # Leaving it ON causes it to try (and fail with OOM) to re-process
      # the huge react-android and hermes-android AARs unnecessarily.
      - name: Disable Jetifier in gradle.properties
        run: |
          sed -i 's/android.enableJetifier=true/android.enableJetifier=false/' android/gradle.properties
          grep -q 'android.enableJetifier' android/gradle.properties || echo 'android.enableJetifier=false' >> android/gradle.properties

      # Increase Gradle JVM heap to avoid OutOfMemoryError during large AAR transforms
      - name: Increase Gradle JVM heap in gradle.properties
        run: |
          sed -i 's/-Xmx[0-9]*[gGmM]/-Xmx4g/g' android/gradle.properties
          grep -q 'org.gradle.jvmargs' android/gradle.properties \
            || echo 'org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m' >> android/gradle.properties

      - name: Clear Gradle cache
        run: |
          rm -rf ~/.gradle/caches
          rm -rf android/.gradle

      - name: Clean build
        run: |
          cd android
          ./gradlew clean

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
