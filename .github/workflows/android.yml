name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # RN 0.79 is fully AndroidX-native — Jetifier must be OFF.
      # Leaving it ON causes OOM when processing react-android / hermes AARs.
      - name: Disable Jetifier in gradle.properties
        run: |
          sed -i 's/android.enableJetifier=true/android.enableJetifier=false/' android/gradle.properties
          grep -q 'android.enableJetifier' android/gradle.properties || echo 'android.enableJetifier=false' >> android/gradle.properties

      # Give Gradle enough heap for RN 0.79's large dependency graph
      - name: Increase Gradle JVM heap in gradle.properties
        run: |
          sed -i 's/-Xmx[0-9]*[gGmM]/-Xmx4g/g' android/gradle.properties
          grep -q 'org.gradle.jvmargs' android/gradle.properties \
            || echo 'org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m' >> android/gradle.properties

      - name: Clear Gradle cache
        run: |
          rm -rf ~/.gradle/caches
          rm -rf android/.gradle

      - name: Clean build
        run: |
          cd android
          ./gradlew clean

      # assembleRelease skips debug-only overhead and avoids some
      # debug-variant Kotlin API conflicts. APK is unsigned but fully installable
      # via adb or can be signed in a follow-up step.
      - name: Build Release APK (unsigned)
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned.apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
